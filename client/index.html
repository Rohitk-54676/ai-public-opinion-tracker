<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Public Opinion Tracker</title>
  <link
    href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Sans:wght@300;400;500&display=swap"
    rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --bg: #050a14;
      --surface: #0d1a2d;
      --surface2: #0f2240;
      --accent: #00e5ff;
      --accent2: #7c3aed;
      --pos: #00ffa3;
      --neg: #ff4d6d;
      --neu: #ffd166;
      --text: #e0eaff;
      --muted: #6b85a8;
      --border: rgba(0, 229, 255, 0.12);
      --glow: 0 0 30px rgba(0, 229, 255, 0.15);
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* ─── Animated starfield bg ─── */
    .stars {
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
      background:
        radial-gradient(ellipse at 20% 50%, rgba(124, 58, 237, 0.08) 0%, transparent 60%),
        radial-gradient(ellipse at 80% 20%, rgba(0, 229, 255, 0.06) 0%, transparent 50%);
    }

    .stars::before,
    .stars::after {
      content: '';
      position: absolute;
      inset: 0;
      background-image:
        radial-gradient(1px 1px at 20% 30%, rgba(255, 255, 255, 0.6) 0%, transparent 0%),
        radial-gradient(1px 1px at 50% 60%, rgba(255, 255, 255, 0.4) 0%, transparent 0%),
        radial-gradient(1px 1px at 70% 20%, rgba(255, 255, 255, 0.5) 0%, transparent 0%),
        radial-gradient(1px 1px at 90% 80%, rgba(255, 255, 255, 0.3) 0%, transparent 0%),
        radial-gradient(1px 1px at 10% 70%, rgba(255, 255, 255, 0.5) 0%, transparent 0%),
        radial-gradient(1px 1px at 35% 85%, rgba(255, 255, 255, 0.3) 0%, transparent 0%),
        radial-gradient(1px 1px at 60% 45%, rgba(255, 255, 255, 0.4) 0%, transparent 0%);
      animation: drift 20s linear infinite;
    }

    .stars::after {
      animation-duration: 35s;
      animation-direction: reverse;
      opacity: 0.5;
    }

    @keyframes drift {
      from {
        transform: translateY(0);
      }

      to {
        transform: translateY(-40px);
      }
    }

    /* ─── Layout ─── */
    .wrapper {
      position: relative;
      z-index: 1;
      max-width: 1100px;
      margin: 0 auto;
      padding: 2rem 1.5rem 5rem;
    }

    /* ─── Header ─── */
    .hero {
      text-align: center;
      padding: 4rem 0 3rem;
      animation: fadeUp 0.8s ease both;
    }

    .hero-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: rgba(0, 229, 255, 0.08);
      border: 1px solid rgba(0, 229, 255, 0.2);
      border-radius: 100px;
      padding: 5px 14px;
      font-size: 11px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 1.5rem;
    }

    .hero-badge span {
      width: 6px;
      height: 6px;
      background: var(--accent);
      border-radius: 50%;
      animation: pulse 2s ease infinite;
    }

    @keyframes pulse {

      0%,
      100% {
        opacity: 1;
        transform: scale(1)
      }

      50% {
        opacity: 0.4;
        transform: scale(0.7)
      }
    }

    h1 {
      font-family: 'Syne', sans-serif;
      font-size: clamp(2.2rem, 5vw, 3.8rem);
      font-weight: 800;
      line-height: 1.1;
      background: linear-gradient(135deg, #ffffff 0%, var(--accent) 60%, var(--accent2) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 1rem;
    }

    .hero-sub {
      color: var(--muted);
      font-size: 1.05rem;
      font-weight: 300;
      max-width: 500px;
      margin: 0 auto 2.5rem;
      line-height: 1.6;
    }

    /* ─── Search bar ─── */
    .search-box {
      display: flex;
      align-items: center;
      max-width: 640px;
      margin: 0 auto;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 6px 6px 6px 20px;
      gap: 10px;
      box-shadow: var(--glow);
      transition: border-color 0.3s, box-shadow 0.3s;
      animation: fadeUp 0.9s ease both;
    }

    .search-box:focus-within {
      border-color: rgba(0, 229, 255, 0.35);
      box-shadow: 0 0 50px rgba(0, 229, 255, 0.2);
    }

    .search-icon {
      color: var(--muted);
      font-size: 1.1rem;
      flex-shrink: 0;
    }

    #topic {
      flex: 1;
      background: none;
      border: none;
      outline: none;
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 1rem;
      font-weight: 400;
      padding: 10px 0;
    }

    #topic::placeholder {
      color: var(--muted);
    }

    .analyze-btn {
      flex-shrink: 0;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border: none;
      border-radius: 12px;
      color: #fff;
      font-family: 'Syne', sans-serif;
      font-size: 0.9rem;
      font-weight: 700;
      padding: 12px 24px;
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s, opacity 0.2s;
      white-space: nowrap;
    }

    .analyze-btn:hover {
      transform: translateY(-1px);
      box-shadow: 0 8px 25px rgba(0, 229, 255, 0.3);
    }

    .analyze-btn:active {
      transform: scale(0.97);
    }

    .analyze-btn:disabled {
      opacity: 0.55;
      cursor: not-allowed;
      transform: none;
    }

    /* ─── Loader ─── */
    #loader {
      display: none;
      text-align: center;
      padding: 4rem 0;
      animation: fadeUp 0.4s ease both;
    }

    .loader-orb {
      width: 64px;
      height: 64px;
      margin: 0 auto 1.5rem;
      border-radius: 50%;
      border: 2px solid transparent;
      border-top-color: var(--accent);
      border-right-color: var(--accent2);
      animation: spin 0.8s linear infinite;
      box-shadow: 0 0 30px rgba(0, 229, 255, 0.25);
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    .loader-text {
      color: var(--muted);
      font-size: 0.95rem;
      letter-spacing: 0.05em;
    }

    .loader-dots span {
      display: inline-block;
      width: 6px;
      height: 6px;
      background: var(--accent);
      border-radius: 50%;
      margin: 0 3px;
      animation: bounce 1.2s ease infinite;
    }

    .loader-dots span:nth-child(2) {
      animation-delay: 0.2s;
    }

    .loader-dots span:nth-child(3) {
      animation-delay: 0.4s;
    }

    @keyframes bounce {

      0%,
      60%,
      100% {
        transform: translateY(0)
      }

      30% {
        transform: translateY(-8px)
      }
    }

    /* ─── Dashboard ─── */
    #dashboard {
      display: none;
    }

    #dashboard.show {
      display: block;
      animation: fadeUp 0.6s ease both;
    }

    @keyframes fadeUp {
      from {
        opacity: 0;
        transform: translateY(20px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .section-label {
      font-family: 'Syne', sans-serif;
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 0.15em;
      color: var(--accent);
      margin-bottom: 1rem;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .section-label::after {
      content: '';
      flex: 1;
      height: 1px;
      background: linear-gradient(to right, var(--border), transparent);
    }

    /* ─── Stat cards ─── */
    .stats-row {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 14px;
      margin: 2rem 0;
    }

    @media (max-width: 600px) {
      .stats-row {
        grid-template-columns: 1fr;
      }
    }

    .stat-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 1.4rem 1.2rem;
      position: relative;
      overflow: hidden;
      transition: transform 0.25s, box-shadow 0.25s;
      animation: fadeUp 0.6s ease both;
    }

    .stat-card:hover {
      transform: translateY(-3px);
      box-shadow: var(--glow);
    }

    .stat-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 3px;
      border-radius: 16px 16px 0 0;
    }

    .stat-card.pos::before {
      background: var(--pos);
    }

    .stat-card.neg::before {
      background: var(--neg);
    }

    .stat-card.neu::before {
      background: var(--neu);
    }

    .stat-glow {
      position: absolute;
      width: 60px;
      height: 60px;
      border-radius: 50%;
      top: -10px;
      right: -10px;
      filter: blur(20px);
      opacity: 0.25;
    }

    .stat-card.pos .stat-glow {
      background: var(--pos);
    }

    .stat-card.neg .stat-glow {
      background: var(--neg);
    }

    .stat-card.neu .stat-glow {
      background: var(--neu);
    }

    .stat-label {
      font-size: 0.72rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--muted);
      margin-bottom: 0.6rem;
    }

    .stat-num {
      font-family: 'Syne', sans-serif;
      font-size: 2.4rem;
      font-weight: 800;
      line-height: 1;
    }

    .stat-card.pos .stat-num {
      color: var(--pos);
    }

    .stat-card.neg .stat-num {
      color: var(--neg);
    }

    .stat-card.neu .stat-num {
      color: var(--neu);
    }

    .stat-pct {
      font-size: 0.78rem;
      color: var(--muted);
      margin-top: 4px;
    }

    /* ─── Chart + Summary grid ─── */
    .main-grid {
      display: grid;
      grid-template-columns: 280px 1fr;
      gap: 20px;
      margin-bottom: 20px;
      align-items: start;
    }

    @media (max-width: 768px) {
      .main-grid {
        grid-template-columns: 1fr;
      }
    }

    .chart-card,
    .summary-card,
    .keywords-card,
    .results-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 1.5rem;
      animation: fadeUp 0.7s ease both;
    }

    .chart-card {
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .chart-wrap {
      width: 200px;
      height: 200px;
      position: relative;
    }

    /* ─── 3D chart ring label ─── */
    .chart-center-label {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      pointer-events: none;
    }

    .chart-center-label .cnum {
      font-family: 'Syne', sans-serif;
      font-size: 1.8rem;
      font-weight: 800;
      color: var(--text);
    }

    .chart-center-label .clabel {
      font-size: 0.7rem;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.1em;
    }

    /* ─── AI Summary ─── */
    .summary-card {
      overflow: hidden;
    }

    #aiSummary {
      font-size: 0.92rem;
      line-height: 1.75;
      color: #a8bdd8;
      max-height: 260px;
      overflow-y: auto;
      padding-right: 4px;
    }

    #aiSummary::-webkit-scrollbar {
      width: 4px;
    }

    #aiSummary::-webkit-scrollbar-track {
      background: transparent;
    }

    #aiSummary::-webkit-scrollbar-thumb {
      background: var(--border);
      border-radius: 4px;
    }

    #aiSummary b {
      color: var(--text);
      font-weight: 500;
    }

    #aiSummary ul {
      padding-left: 1.2rem;
      margin-top: 0.5rem;
    }

    #aiSummary li {
      margin-bottom: 0.4rem;
    }

    /* ─── Keywords ─── */
    .keywords-card {
      margin-bottom: 20px;
    }

    .keyword-chips {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 0.8rem;
    }

    .chip {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      background: rgba(0, 229, 255, 0.07);
      border: 1px solid rgba(0, 229, 255, 0.18);
      border-radius: 100px;
      padding: 5px 12px;
      font-size: 0.82rem;
      color: var(--accent);
      font-weight: 500;
      transition: background 0.2s, transform 0.2s;
      animation: chipPop 0.4s ease both;
    }

    .chip:hover {
      background: rgba(0, 229, 255, 0.14);
      transform: scale(1.04);
    }

    @keyframes chipPop {
      from {
        opacity: 0;
        transform: scale(0.8);
      }

      to {
        opacity: 1;
        transform: scale(1);
      }
    }

    /* ─── Results ─── */
    .results-card {
      padding-top: 1.2rem;
    }

    #results {
      margin-top: 0.8rem;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .result-item {
      background: rgba(13, 26, 45, 0.6);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 14px 16px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      transition: border-color 0.25s, transform 0.25s;
      animation: fadeUp 0.5s ease both;
    }

    .result-item:hover {
      border-color: rgba(0, 229, 255, 0.25);
      transform: translateX(4px);
    }

    .result-text {
      font-size: 0.9rem;
      color: #9ab3cc;
      line-height: 1.6;
    }

    .result-footer {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .sentiment-badge {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      border-radius: 100px;
      padding: 3px 10px;
      font-size: 0.72rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    .sentiment-badge.positive {
      background: rgba(0, 255, 163, 0.12);
      color: var(--pos);
      border: 1px solid rgba(0, 255, 163, 0.25);
    }

    .sentiment-badge.negative {
      background: rgba(255, 77, 109, 0.12);
      color: var(--neg);
      border: 1px solid rgba(255, 77, 109, 0.25);
    }

    .sentiment-badge.neutral {
      background: rgba(255, 209, 102, 0.12);
      color: var(--neu);
      border: 1px solid rgba(255, 209, 102, 0.25);
    }

    .score-pill {
      font-size: 0.7rem;
      color: var(--muted);
      background: rgba(255, 255, 255, 0.04);
      border-radius: 100px;
      padding: 2px 8px;
    }

    /* ─── Bar meter ─── */
    .sentiment-bar {
      display: flex;
      height: 6px;
      border-radius: 3px;
      overflow: hidden;
      margin: 1.2rem 0 0;
    }

    .bar-pos {
      background: var(--pos);
      transition: width 1.2s cubic-bezier(0.16, 1, 0.3, 1);
    }

    .bar-neg {
      background: var(--neg);
      transition: width 1.2s cubic-bezier(0.16, 1, 0.3, 1) 0.1s;
    }

    .bar-neu {
      background: var(--neu);
      transition: width 1.2s cubic-bezier(0.16, 1, 0.3, 1) 0.2s;
    }

    /* ─── Toast error ─── */
    .toast {
      position: fixed;
      bottom: 2rem;
      right: 2rem;
      z-index: 999;
      background: rgba(255, 77, 109, 0.15);
      border: 1px solid rgba(255, 77, 109, 0.3);
      border-radius: 12px;
      padding: 14px 20px;
      color: var(--neg);
      font-size: 0.9rem;
      animation: slideIn 0.35s ease;
      max-width: 320px;
    }

    @keyframes slideIn {
      from {
        opacity: 0;
        transform: translateY(20px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* ─── No results ─── */
    .empty {
      text-align: center;
      padding: 3rem;
      color: var(--muted);
      font-size: 0.95rem;
    }

    /* ─── Responsive ─── */
    @media (max-width: 480px) {
      h1 {
        font-size: 2rem;
      }

      .search-box {
        flex-wrap: wrap;
      }

      .analyze-btn {
        width: 100%;
        text-align: center;
        border-radius: 10px;
      }

      .chart-wrap {
        width: 160px;
        height: 160px;
      }
    }
  </style>
</head>

<body>

  <div class="stars"></div>

  <div class="wrapper">

    <!-- Hero -->
    <header class="hero">
      <div class="hero-badge"><span></span> Live Intelligence</div>
      <h1>Public Opinion<br>Tracker</h1>
      <p class="hero-sub">Instant AI-powered sentiment analysis across any topic, trend, or keyword.</p>

      <div class="search-box">
        <span class="search-icon">🔍</span>
        <input id="topic" placeholder="Try: IPL, Tesla, Budget 2025…" autocomplete="off"
          onkeydown="if(event.key==='Enter') analyze()" />
        <button class="analyze-btn" onclick="analyze()" id="analyzeBtn">Analyze →</button>
      </div>
    </header>

    <!-- Loader -->
    <div id="loader">
      <div class="loader-orb"></div>
      <p class="loader-text">Analyzing Opinion</p>
      <div class="loader-dots" style="margin-top:10px">
        <span></span><span></span><span></span>
      </div>
    </div>

    <!-- Dashboard -->
    <div id="dashboard">

      <!-- Stats -->
      <div class="section-label">Sentiment Breakdown</div>
      <div class="stats-row">
        <div class="stat-card pos" style="animation-delay:0.05s">
          <div class="stat-glow"></div>
          <div class="stat-label">Positive</div>
          <div class="stat-num" id="posNum">0</div>
          <div class="stat-pct" id="posPct">—</div>
        </div>
        <div class="stat-card neg" style="animation-delay:0.1s">
          <div class="stat-glow"></div>
          <div class="stat-label">Negative</div>
          <div class="stat-num" id="negNum">0</div>
          <div class="stat-pct" id="negPct">—</div>
        </div>
        <div class="stat-card neu" style="animation-delay:0.15s">
          <div class="stat-glow"></div>
          <div class="stat-label">Neutral</div>
          <div class="stat-num" id="neuNum">0</div>
          <div class="stat-pct" id="neuPct">—</div>
        </div>
      </div>

      <!-- Sentiment progress bar -->
      <div class="sentiment-bar" id="sentBar">
        <div class="bar-pos" id="barPos" style="width:0%"></div>
        <div class="bar-neg" id="barNeg" style="width:0%"></div>
        <div class="bar-neu" id="barNeu" style="width:0%"></div>
      </div>

      <!-- Chart + Summary -->
      <div class="main-grid" style="margin-top:24px">
        <div class="chart-card">
          <div class="section-label" style="width:100%">Distribution</div>
          <div class="chart-wrap">
            <canvas id="chart"></canvas>
            <div class="chart-center-label">
              <div class="cnum" id="totalNum">0</div>
              <div class="clabel">total</div>
            </div>
          </div>
        </div>
        <div class="summary-card">
          <div class="section-label">AI Analysis</div>
          <div id="aiSummary"><span style="color:var(--muted); font-size:0.9rem">No summary available.</span></div>
        </div>
      </div>

      <!-- Keywords -->
      <div class="keywords-card">
        <div class="section-label">Top Keywords</div>
        <div class="keyword-chips" id="keywords"></div>
      </div>

      <!-- Results -->
      <div class="results-card">
        <div class="section-label">Sample Results</div>
        <div id="results"></div>
      </div>

    </div>
  </div>

  <script>
    const btn = document.querySelector("button");

    window.addEventListener("load", async () => {
      btn.disabled = true;

      try {
        await fetch("https://ai-backend-qgwb.onrender.com");
        await fetch("https://ai-service-2i4j.onrender.com");
        console.log("rebooting servers")
      } catch {
        console.log("rebot failed");
       }

      btn.disabled = false;
    });
    let chart;

    async function analyze() {
      const topic = document.getElementById("topic").value.trim();
      if (!topic) return showToast("Please enter a topic first.");

      const btn = document.getElementById("analyzeBtn");
      btn.disabled = true;
      btn.textContent = "Analyzing…";

      document.getElementById("loader").style.display = "block";
      const dash = document.getElementById("dashboard");
      dash.classList.remove("show");
      dash.style.display = "none";

      try {
        const res = await fetch("https://ai-backend-qgwb.onrender.com/api/analyze", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ topic })
        });
        const data = await res.json();

        document.getElementById("loader").style.display = "none";
        dash.style.display = "block";
        setTimeout(() => dash.classList.add("show"), 10);

        process(data);
      } catch (err) {
        document.getElementById("loader").style.display = "none";
        showToast("Could not connect to server. Is your backend running?");
        console.error(err);
      } finally {
        btn.disabled = false;
        btn.textContent = "Analyze →";
      }
    }

    function process(data) {
      const results = data.results || [];
      let pos = 0, neg = 0, neu = 0;
      results.forEach(r => {
        if (r.sentiment === "positive") pos++;
        else if (r.sentiment === "negative") neg++;
        else neu++;
      });
      const total = pos + neg + neu || 1;

      // Animate stat numbers
      animateNum("posNum", pos);
      animateNum("negNum", neg);
      animateNum("neuNum", neu);
      animateNum("totalNum", total);

      const pct = n => Math.round((n / total) * 100) + "%";
      document.getElementById("posPct").textContent = pct(pos) + " of opinions";
      document.getElementById("negPct").textContent = pct(neg) + " of opinions";
      document.getElementById("neuPct").textContent = pct(neu) + " of opinions";

      // Sentiment bar
      setTimeout(() => {
        document.getElementById("barPos").style.width = pct(pos);
        document.getElementById("barNeg").style.width = pct(neg);
        document.getElementById("barNeu").style.width = pct(neu);
      }, 100);

      // AI summary
      document.getElementById("aiSummary").innerHTML = formatSummary(data.summary) ||
        '<span style="color:var(--muted);font-size:0.9rem">No summary available.</span>';

      // Keywords
      const kw = data.keywords || [];
      document.getElementById("keywords").innerHTML = kw.length
        ? kw.map((k, i) => `<span class="chip" style="animation-delay:${i * 0.06}s"># ${k}</span>`).join("")
        : '<span style="color:var(--muted);font-size:0.85rem">No keywords found.</span>';

      drawChart(pos, neg, neu);
      display(results);
    }

    function animateNum(id, target) {
      const el = document.getElementById(id);
      let current = 0;
      const step = Math.ceil(target / 20);
      const timer = setInterval(() => {
        current = Math.min(current + step, target);
        el.textContent = current;
        if (current >= target) clearInterval(timer);
      }, 40);
    }

    function drawChart(pos, neg, neu) {
      const ctx = document.getElementById("chart");
      if (chart) chart.destroy();
      chart = new Chart(ctx, {
        type: "doughnut",
        data: {
          labels: ["Positive", "Negative", "Neutral"],
          datasets: [{
            data: [pos, neg, neu],
            backgroundColor: ["#00ffa3", "#ff4d6d", "#ffd166"],
            borderColor: "transparent",
            borderWidth: 0,
            hoverOffset: 10
          }]
        },
        options: {
          cutout: "72%",
          plugins: {
            legend: { display: false }, tooltip: {
              callbacks: { label: ctx => ` ${ctx.label}: ${ctx.parsed}` },
              backgroundColor: "#0d1a2d",
              borderColor: "rgba(0,229,255,0.2)",
              borderWidth: 1,
              titleColor: "#e0eaff",
              bodyColor: "#a8bdd8",
              padding: 10
            }
          },
          animation: { animateRotate: true, duration: 1000 }
        }
      });
    }

    function display(results) {
      if (!results.length) {
        document.getElementById("results").innerHTML = '<div class="empty">No results found.</div>';
        return;
      }
      document.getElementById("results").innerHTML = results.map((r, i) => `
    <div class="result-item" style="animation-delay:${i * 0.04}s">
      <div class="result-text">${cleanText(r.text)}</div>
      <div class="result-footer">
        <span class="sentiment-badge ${r.sentiment}">${r.sentiment}</span>
        <span class="score-pill">score: ${r.score}</span>
      </div>
    </div>
  `).join("");
    }

    function formatSummary(text) {
      if (!text) return "";
      return text
        .replace(/\*\*(.*?)\*\*/g, "<b>$1</b>")
        .replace(/\*\s(.*?)(?=\n|$)/g, "<li>$1</li>")
        .replace(/\n/g, "<br>")
        .replace(/(<li>.*<\/li>)/gs, "<ul>$1</ul>");
    }

    function cleanText(text) {
      return text.replace(/\*\*/g, "").replace(/\*/g, "").trim();
    }

    function showToast(msg) {
      const old = document.querySelector(".toast");
      if (old) old.remove();
      const t = document.createElement("div");
      t.className = "toast";
      t.textContent = msg;
      document.body.appendChild(t);
      setTimeout(() => t.remove(), 4000);
    }
  </script>
</body>

</html>
